services:
    db:
        image: postgres:16
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - 5432:5432
    ingestion:
        build: ./src/IngestionService
        ports:
            - 5001:8080
        environment:
            - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
        depends_on:
            - db
    consensus:
        build: ./src/ConsensusService
        depends_on:
            - db
    notification:
        build: ./src/NotificationService
        ports:
            - 5002:8080
        depends_on:
            - ingestion
