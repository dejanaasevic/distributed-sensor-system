services:
    db:
        image: postgres:16
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - 5433:5432
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
            interval: 5s
            retries: 5
    ingestion:
        build: ./src/IngestionService
        ports:
            - 5001:8080
        tty: true
        environment:
            - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            - NotificationHubUrl=http://notification:8080/notificationHub
        depends_on:
            db:
                condition: service_healthy
    consensus:
        build: ./src/ConsensusService
        environment:
            - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
        depends_on:
            db:
                condition: service_healthy
    notification:
        build: ./src/NotificationService
        ports:
            - 5002:8080
        depends_on:
            - ingestion

    sensor:
        build: ./src/SensorClient
        tty: true
        stdin_open: true
        environment:
            - URL=http://ingestion:8080
        depends_on:
            - ingestion

    reports:
        build: ./src/ReportsClient
        stdin_open: true
        tty: true
        environment:
            - URL=http://ingestion:8080
        depends_on:
            - ingestion
